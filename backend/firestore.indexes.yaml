# Firestore composite indexes required for realAI
#
# Deploy: firebase deploy --only firestore:indexes
# Requires firebase-tools: npm install -g firebase-tools
# And firebase.json at project root with:
#   { "firestore": { "indexes": "firestore.indexes.yaml" } }

indexes:
  - collectionGroup: documents
    queryScope: COLLECTION
    fields:
      - fieldPath: userId
        order: ASCENDING
      - fieldPath: createdAt
        order: DESCENDING

  - collectionGroup: conversations
    queryScope: COLLECTION
    fields:
      - fieldPath: userId
        order: ASCENDING
      - fieldPath: updatedAt
        order: DESCENDING

  - collectionGroup: search_history
    queryScope: COLLECTION
    fields:
      - fieldPath: userId
        order: ASCENDING
      - fieldPath: createdAt
        order: DESCENDING
